<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styled Pricing Table</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Pricing Plans</h1>

  <div class="pricing-container">

    <div class="card">
      <h2>Basic</h2>
      <h3>₹199/month</h3>

      <ul>
        <li>5GB Storage</li>
        <li>Email Support</li>
        <li>1 User</li>
      </ul>

      <button>Select Plan</button>
    </div>

    <div class="card premium">
      <h2>Standard</h2>
      <h3>₹499/month</h3>

      <ul>
        <li>50GB Storage</li>
        <li>Priority Support</li>
        <li>5 Users</li>
      </ul>

      <button>Select Plan</button>
    </div>

    <div class="card">
      <h2>Premium</h2>
      <h3>₹999/month</h3>

      <ul>
        <li>Unlimited Storage</li>
        <li>24/7 Support</li>
        <li>Unlimited Users</li>
      </ul>

      <button>Select Plan</button>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
