<!DOCTYPE html>
<html lang="en">
<head>

    <title>Expandable Rows</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Feature Information</h1>

    <div class="row" onclick="toggleRow(this)">
        <div class="title">Feature 1</div>
        <div class="content">
            This is detailed information about Feature 1.
        </div>
    </div>

    <div class="row" onclick="toggleRow(this)">
        <div class="title">Feature 2</div>
        <div class="content">
            This is detailed information about Feature 2.
        </div>
    </div>

    <div class="row" onclick="toggleRow(this)">
        <div class="title">Feature 3</div>
        <div class="content">
            This is detailed information about Feature 3.
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
