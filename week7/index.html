<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enhanced Pricing Table</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Pricing Plans</h1>

  <div class="pricing-table">

    <div class="card">
      <h2>Basic</h2>
      <p>$10/month</p>
      <button>Select</button>
    </div>

    <div class="card popular">
      <h2>Standard</h2>
      <p>$20/month</p>
      <button>Select</button>
    </div>

    <div class="card">
      <h2>Premium</h2>
      <p>$30/month</p>
      <button>Select</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
