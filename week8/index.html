<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Table</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">Pricing Plans</h1>

    <div class="container">

        <!-- Basic Plan -->
        <div class="card">
            <h2>Basic</h2>

            <p class="price">$10/month</p>

            <ul>
                <li>10GB Storage</li>
                <li>Email Support</li>
                <li>1 User</li>
            </ul>

            <button class="plan-btn">
                Choose Plan
            </button>
        </div>

        <!-- Standard Plan -->
        <div class="card">
            <h2>Standard</h2>

            <p class="price">$20/month</p>

            <ul>
                <li>50GB Storage</li>
                <li>Chat Support</li>
                <li>5 Users</li>
            </ul>

            <button class="plan-btn">
                Choose Plan
            </button>
        </div>

        <!-- Premium Plan -->
        <div class="card">
            <h2>Premium</h2>

            <p class="price">$30/month</p>

            <ul>
                <li>100GB Storage</li>
                <li>24/7 Support</li>
                <li>Unlimited Users</li>
            </ul>

            <button class="plan-btn">
                Choose Plan
            </button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
